<!doctype html>
<html lang="en" class="obfuscate">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />

</head>
<style>
	.modal-backdrop.open {
		display: flex;
	}

	.modal {
		background: var(--bg-2);
		border: 1px solid var(--border-4);
		border-radius: 16px;
		padding: 22px;
		width: 360px;
		max-width: calc(100vw - 32px);
		box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
		animation: modal-in 0.18s ease;
	}

	@keyframes modal-in {
		from {
			opacity: 0;
			transform: scale(0.97) translateY(4px);
		}

		to {
			opacity: 1;
			transform: none;
		}
	}

	.modal h2 {
		margin: 0 0 14px;
		font-size: 1.05rem;
		font-weight: 700;
		color: var(--bright-text);
	}

	.modal label {
		display: block;
		font-size: 10.5px;
		font-weight: 500;
		color: var(--text-2);
		opacity: 0.65;
		margin-bottom: 5px;
		margin-top: 13px;
	}

	.modal label:first-of-type {
		margin-top: 0;
	}

	.modal input[type="text"] {
		width: 100%;
		background: var(--bg-3);
		border: 1px solid var(--border-4);
		border-radius: 9px;
		padding: 9px 13px;
		color: var(--bright-text);
		font-size: 0.88rem;
		outline: none;
		box-sizing: border-box;
		transition: border-color 0.15s;
	}

	.modal input[type="text"]:focus {
		border-color: rgba(255, 255, 255, 0.2);
	}

	.modal-toggle-row {
		display: flex;
		align-items: center;
		justify-content: space-between;
		margin-top: 14px;
		padding: 9px 13px;
		background: var(--bg-3);
		border-radius: 9px;
		border: 1px solid var(--border-4);
	}

	.modal-toggle-row span {
		font-size: 0.88rem;
		color: var(--text);
		display: flex;
		align-items: center;
		gap: 7px;
	}

	.modal-toggle-row span i {
		opacity: 0.55;
		font-size: 12px;
	}

	.modal-backdrop {
		display: none;
		position: fixed;
		inset: 0;
		background: rgba(0, 0, 0, 0.55);
		z-index: 100;
		align-items: center;
		justify-content: center;
		backdrop-filter: blur(4px);
	}

	.modal-actions {
		display: flex;
		gap: 7px;
		margin-top: 18px;
		justify-content: flex-end;
	}

	.btn {
		padding: 8px 16px;
		border-radius: 9px;
		border: none;
		font-size: 0.85rem;
		font-weight: 600;
		cursor: pointer;
		transition: opacity 0.15s, background 0.15s;
	}

	.btn:hover {
		opacity: 0.85;
	}

	.btn-ghost {
		background: transparent;
		color: var(--text-2);
		border: 1px solid var(--border-4);
	}

	.btn-primary {
		background: var(--accent);
		color: var(--bright-text);
	}

	.modal-hint {
		font-size: 10.5px;
		color: var(--text-2);
		opacity: 0.55;
		margin-top: 5px;
	}

	.modal-error {
		font-size: 11.5px;
		color: #f04747;
		margin-top: 7px;
		min-height: 15px;
	}
</style>

<body>
	<center>
		<div style="
					left: 50%;

					transform: translate(-50%, -50%);

				">
			<h1 class="hometitle">Infrared</h1>
			<p id="splash"></p>
			<div class="inputcontainer">
				<i class="far fa-search"></i>
				<input type="text" id="homesearchlol" placeholder="Search for anything..." />
			</div>
			<br />
			<div class="flex-row" style="gap: 10px">
				<a href="/pages/browse.html?url=play.geforcenow.com/mall/">
					<div class="shortcut-home">
						<img src="/assets/img/shortcuts/nvidia.png" alt="" />
						<h3>GF NOW</h3>
					</div>
				</a>
				<a href="/pages/browse.html?url=https://invidious.nerdvpn.de/">
					<div class="shortcut-home">
						<img src="/assets/img/shortcuts/youtube.png" alt="" />
						<h3>Youtube</h3>
					</div>
				</a>
				<a href="/pages/browse.html?url=github.com">
					<div class="shortcut-home">
						<img src="/assets/img/shortcuts/github.png" alt="" />
						<h3>Github</h3>
					</div>
				</a>
				<a href="https://discord.gg/hUYzETaQ9U" target="_blank">
					<div class="shortcut-home">
						<i class="fab fa-discord" style="color: white; font-size: 29px; margin-bottom: 10px;"></i>
						<h3>Join the Discord!</h3>
					</div>
				</a>
			</div>
		</div>
		<p id="home-status" style="
					position: absolute;
					bottom: 10px;
					left: 50%;
					transform: translateX(-50%);
					opacity: 0.5;
					text-align: center;
				">
			Ready
		</p>
	</center>
	<script src="/assets/js/infrared.index.js"></script>
	<script>
		document
			.getElementById("homesearchlol")
			.addEventListener("keydown", (e) => {
				if (e.key === "Enter") {
					const rawQuery = document
						.getElementById("homesearchlol")
						.value.trim();
					window.parent.document.getElementById("contentframe").src =
						"/pages/browse.html?url=" + encodeURIComponent(rawQuery);
				}
			});
	</script>
	<script type="module">
		import BareClient, { BareMuxConnection } from "/baremux/index.mjs";

		const statusEl = document.getElementById("home-status");
		const defaultStatus = "Ready";
		const ipLabels = {
			"5.188.124.131": "gcore-lb",
			"5.188.124.67": "gcore-dedi",
			"5.188.124.58": "infrared-vps",
			"15.204.211.196": "ovh-lb",
		};

		async function loadHomeStatus() {
			if (!statusEl) return;

			try {
				const connection = new BareMuxConnection("/baremux/worker.js");
				const wispUrl =
					(window.location.protocol === "https:" ? "wss://" : "ws://") +
					window.location.host +
					"/socket/";
				const selectedTransport =
					localStorage.getItem("infrared_transport") || "libcurl";

				switch (selectedTransport) {
					case "epoxy":
						await connection.setTransport("/epoxy/index.mjs", [
							{ wisp: wispUrl },
						]);
						break;
					case "libcurl":
					default:
						await connection.setTransport("/libcurl/index.mjs", [
							{ websocket: wispUrl },
						]);
						break;
				}

				const client = new BareClient(connection.getInnerPort());
				const response = await client.fetch("https://ipv4.myip.wtf");
				const body = (await response.text()).trim();
				const ip = body.match(/\b\d{1,3}(?:\.\d{1,3}){3}\b/)?.[0];

				statusEl.textContent =
					(ip && ipLabels[ip]) || defaultStatus;
			} catch {
				statusEl.textContent = defaultStatus;
			}
		}

		loadHomeStatus();
	</script>
	<div id="particles-container"></div>

	<script src="/assets/js/lib/particles.js"></script>
	<script>

		);
	</script>
	<script>
		document.getElementById("csslink").href =
			`/assets/css/colors/${localStorage.getItem("infrared_theme") ?? "default"}.css`;
	</script>

	<script src="/assets/js/infrared.ads.js"></script>

</body>
